name: Ablation harness — runner-comparison delta

# Plan reference:
# plans/2026-05-12-002-feat-managed-agents-full-migration-plan.md
#   Step 1  — extend ablation harness + CI wire-up (this workflow)
#   §9.3    — cutover gate: Verifier verdict distribution within ±10%
#             of the OpenAI baseline (Mirror) and Connector rejection rate
#             within +15% (Connector). The PR comment posted by this job
#             is the per-PR signal the dev reads to make that call.
#
# What this does:
#   1. Check out `main`, run `pnpm ablate:<surface> --runner=openai` against
#      a Neon preview branch seeded from the multistudent fixture. Save the
#      resulting JSON as the baseline.
#   2. Check out PR HEAD, run `pnpm ablate:<surface> --runner=openai` (later:
#      `--runner=managed` once Step 6 lands). Save the JSON as the candidate.
#   3. Run `scripts/ablate-delta.ts` to produce a markdown delta and post it
#      as a PR comment.
#
# Required secrets (set in repo settings → Secrets and variables → Actions):
#   OPENAI_API_KEY        — used by the Mirror + Connector ablation runs.
#   DATABASE_URL          — Neon pooled URL for a CI-scoped Postgres branch.
#                           Wired in Step 2 of the migration plan; until that
#                           lands the seed step reads from `app.db` (SQLite)
#                           and DATABASE_URL is unused.
#   ANTHROPIC_API_KEY     — only required once Step 6 enables
#                           `--runner=managed`. Safe to leave unset today.
#
# Until secrets are provisioned, this workflow will fail loudly. That is
# intentional — it forces an explicit "wire up the secret" decision rather
# than silently passing on a placeholder run.

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/agents/**'
      - 'src/db/**'
      - 'src/server/**'
      - 'scripts/ablate.ts'
      - 'scripts/ablate-delta.ts'
      - 'test/ablation/**'
      - '.github/workflows/ablation.yml'

permissions:
  pull-requests: write   # required to post the delta comment
  contents: read

jobs:
  ablation-delta:
    runs-on: ubuntu-latest
    strategy:
      # Both surfaces run independently; failures in one do not abort the other.
      fail-fast: false
      matrix:
        surface: [mirror, sensemake]
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can switch to main + back

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run baseline ablation on `main`
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- . ':!.github/workflows/ablation.yml' ':!scripts/ablate-delta.ts'
          pnpm ablate:${{ matrix.surface }} --runner=openai --limit=8
          mv test/ablation/reports/*-openai-${{ matrix.surface }}*.json /tmp/baseline-${{ matrix.surface }}.json

      - name: Restore PR HEAD
        run: git checkout -- .

      - name: Run candidate ablation on PR HEAD
        run: |
          pnpm ablate:${{ matrix.surface }} --runner=openai --limit=8
          mv test/ablation/reports/*-openai-${{ matrix.surface }}*.json /tmp/candidate-${{ matrix.surface }}.json

      - name: Compute delta
        run: |
          pnpm tsx scripts/ablate-delta.ts \
            /tmp/baseline-${{ matrix.surface }}.json \
            /tmp/candidate-${{ matrix.surface }}.json \
            --out=/tmp/delta-${{ matrix.surface }}.md

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ablation-${{ matrix.surface }}
          path: /tmp/delta-${{ matrix.surface }}.md
